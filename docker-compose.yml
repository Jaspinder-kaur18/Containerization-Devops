version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
      DB_HOST: db
    depends_on:
      - db
    networks:
      mynet:
        ipv4_address: 192.168.1.10

  db:
    build: ./database
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      mynet:
        ipv4_address: 192.168.1.11

volumes:
  pgdata:

networks:
  mynet:
    external: true
